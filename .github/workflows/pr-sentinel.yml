name: pr-sentinel

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

permissions:
  checks: write
  statuses: write

jobs:
  issue-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Check for issue reference
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check PR title or body for issue reference patterns:
          #   #123, GH-123, fixes #123, closes #123, resolves #123
          PATTERN='(#[0-9]+|GH-[0-9]+|[Ff]ixes #[0-9]+|[Cc]loses #[0-9]+|[Rr]esolves #[0-9]+)'

          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ Issue reference found in PR title"
            exit 0
          fi

          if echo "$PR_BODY" | grep -qE "$PATTERN"; then
            echo "✅ Issue reference found in PR body"
            exit 0
          fi

          echo "❌ No issue reference found."
          echo ""
          echo "PR title and body must reference a GitHub issue."
          echo "Examples: '#123', 'fixes #123', 'closes #45'"
          echo ""
          echo "Title: $PR_TITLE"
          exit 1
